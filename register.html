<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - My Workplace</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-color);
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        .register-container {
            width: 100%;
            max-width: 420px;
            padding: 48px;
            background: var(--card-bg);
            border-radius: 24px;
            /* 新拟物外阴影 - 凸起效果 */
            box-shadow:
                8px 8px 16px var(--shadow-dark),
                -8px -8px 16px var(--shadow-light);
            margin: 20px;
        }

        .register-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .app-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: var(--primary-color);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Logo 凸起效果 */
            box-shadow:
                4px 4px 8px var(--shadow-dark),
                -4px -4px 8px var(--shadow-light);
            color: white;
            font-size: 36px;
        }

        .register-header h1 {
            font-size: 28px;
            color: var(--primary-color);
            margin-bottom: 8px;
        }

        .register-header p {
            font-size: 16px;
            color: var(--text-light);
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            height: 56px;
            padding: 0 20px;
            border: none;
            border-radius: 12px;
            background: var(--card-bg);
            /* 新拟物内阴影 - 凹陷效果 */
            box-shadow:
                inset 5px 5px 10px var(--shadow-dark),
                inset -5px -5px 10px var(--shadow-light);
            font-size: 15px;
            color: var(--text-color);
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            /* 聚焦时加深凹陷效果 */
            box-shadow:
                inset 6px 6px 12px var(--shadow-dark),
                inset -6px -6px 12px var(--shadow-light);
        }

        .form-input::placeholder {
            color: var(--text-light);
        }

        .password-group {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            font-size: 18px;
            padding: 0;
        }

        .password-toggle:hover {
            color: var(--primary-color);
        }
        }

        .form-actions {
            display: flex;
            align-items: center;
            margin-bottom: 40px;
        }

        .agree-terms {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .agree-terms input[type="checkbox"] {
            width: 20px;
            height: 20px;
            border: none;
            border-radius: 6px;
            background: var(--card-bg);
            /* 复选框凹陷效果 */
            box-shadow:
                inset 3px 3px 6px var(--shadow-dark),
                inset -3px -3px 6px var(--shadow-light);
            cursor: pointer;
            appearance: none;
            position: relative;
        }

        .agree-terms input[type="checkbox"]:checked {
            background: transparent;
        }

        .agree-terms input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            color: #6b7fff;
            font-size: 14px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .agree-terms label {
            font-size: 14px;
            color: var(--text-light);
            cursor: pointer;
            margin: 0;
        }

        .agree-terms a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .agree-terms a:hover {
            opacity: 0.8;
        }

        .btn-register {
            width: 100%;
            height: 56px;
            border: none;
            border-radius: 12px;
            background: var(--primary-color);
            /* 按钮凸起效果 */
            box-shadow:
                6px 6px 12px var(--shadow-dark),
                -6px -6px 12px var(--shadow-light);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-register:hover {
            /* 悬停时减弱阴影，营造浮起感 */
            box-shadow:
                4px 4px 8px var(--shadow-dark),
                -4px -4px 8px var(--shadow-light);
            transform: translateY(-2px);
        }

        .btn-register:active {
            /* 点击时变成凹陷效果 */
            box-shadow:
                inset 3px 3px 6px rgba(0, 0, 0, 0.2),
                inset -3px -3px 6px rgba(255, 255, 255, 0.1);
            transform: translateY(0);
        }

        .btn-register:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 32px 0;
            gap: 16px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .divider span {
            color: var(--text-light);
            font-size: 14px;
        }

        .login-link {
            text-align: center;
            font-size: 14px;
            color: var(--text-light);
        }

        .login-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
            margin-left: 4px;
        }

        .login-link a:hover {
            opacity: 0.8;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: rgba(72, 187, 120, 0.1);
            border: 1px solid rgba(72, 187, 120, 0.3);
            color: #059669;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <div class="app-logo">
                <i class="fas fa-briefcase"></i>
            </div>
            <h1>Create Account</h1>
            <p>注册 My Workplace 账号</p>
        </div>

        <div id="error-message" class="error-message"></div>
        <div id="success-message" class="success-message"></div>

        <form id="register-form">
            <div class="form-group">
                <label for="email">邮箱地址</label>
                <input
                    type="email"
                    id="email"
                    class="form-input"
                    placeholder="your@email.com"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <div class="password-group">
                    <input
                        type="password"
                        id="password"
                        class="form-input"
                        placeholder="至少6位字符"
                        minlength="6"
                        required
                    >
                    <button type="button" class="password-toggle" onclick="togglePassword('password')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="confirm-password">确认密码</label>
                <div class="password-group">
                    <input
                        type="password"
                        id="confirm-password"
                        class="form-input"
                        placeholder="再次输入密码"
                        minlength="6"
                        required
                    >
                    <button type="button" class="password-toggle" onclick="togglePassword('confirm-password')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-actions">
                <label class="agree-terms">
                    <input type="checkbox" id="agree-terms" required>
                    <label for="agree-terms">我同意 <a href="#">服务条款</a> 和 <a href="#">隐私政策</a></label>
                </label>
            </div>

            <button type="submit" class="btn-register" id="register-btn">
                <span class="btn-text">注册</span>
                <span class="btn-loading" style="display: none;">
                    <i class="fas fa-spinner fa-spin"></i> 注册中...
                </span>
            </button>
        </form>

        <div class="divider">
            <span>或</span>
        </div>

        <p class="login-link">
            已有账号？<a href="login.html">立即登录</a>
        </p>
    </div>

        <script>
        // 内联Supabase配置（避免file://协议的CORS问题）
        window.supabaseConfig = {
  "url": "https://aidajdmocdgecwwmzphm.supabase.co",
  "key": "sb_publishable_BYAXSI16XDU__PZiGnmsIw_dV6ycGp2"
}
;
    </script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
    <script>
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const button = input.nextElementSibling;
            const icon = button.querySelector('i');

            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const agreeTerms = document.getElementById('agree-terms').checked;

            // 验证密码
            if (password !== confirmPassword) {
                showError('两次输入的密码不一致');
                return;
            }

            if (password.length < 8) {
                showError('密码至少需要6位字符');
                return;
            }

            if (!agreeTerms) {
                showError('请同意服务条款和隐私政策');
                return;
            }

            // 显示加载状态
            const btn = document.getElementById('register-btn');
            const btnText = btn.querySelector('.btn-text');
            const btnLoading = btn.querySelector('.btn-loading');

            btn.disabled = true;
            btnText.style.display = 'none';
            btnLoading.style.display = 'inline';

            try {
                // 调用注册函数
                const result = await window.auth.register(email, password);

                if (result.error) {
                    showError(result.error.message);
                } else {
                    showSuccess('注册成功！正在跳转到主页...');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                }
            } catch (error) {
                showError('注册失败：' + error.message);
            } finally {
                btn.disabled = false;
                btnText.style.display = 'inline';
                btnLoading.style.display = 'none';
            }
        });

        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            successDiv.classList.remove('show');

            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 5000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('success-message');
            const errorDiv = document.getElementById('error-message');
            successDiv.textContent = message;
            successDiv.classList.add('show');
            errorDiv.classList.remove('show');
        }
    </script>
</body>
</html>
