<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码 - My Workplace</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-color);
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        .reset-container {
            width: 100%;
            max-width: 420px;
            padding: 48px;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow:
                8px 8px 16px var(--shadow-dark),
                -8px -8px 16px var(--shadow-light);
            margin: 20px;
        }

        .reset-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .reset-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: var(--primary-color);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow:
                4px 4px 8px var(--shadow-dark),
                -4px -4px 8px var(--shadow-light);
            color: white;
            font-size: 36px;
        }

        .reset-header h1 {
            font-size: 28px;
            color: var(--primary-color);
            margin-bottom: 8px;
        }

        .reset-header p {
            font-size: 16px;
            color: var(--text-light);
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            height: 56px;
            padding: 0 20px;
            border: none;
            border-radius: 12px;
            background: var(--card-bg);
            box-shadow:
                inset 5px 5px 10px var(--shadow-dark),
                inset -5px -5px 10px var(--shadow-light);
            font-size: 15px;
            color: var(--text-color);
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            box-shadow:
                inset 6px 6px 12px var(--shadow-dark),
                inset -6px -6px 12px var(--shadow-light);
        }

        .form-input::placeholder {
            color: var(--text-light);
        }

        .password-strength {
            margin-top: 8px;
            font-size: 13px;
            color: var(--text-light);
        }

        .password-strength.weak {
            color: #ef4444;
        }

        .password-strength.medium {
            color: #f59e0b;
        }

        .password-strength.strong {
            color: #10b981;
        }

        .btn-reset {
            width: 100%;
            height: 56px;
            border: none;
            border-radius: 12px;
            background: var(--primary-color);
            box-shadow:
                6px 6px 12px var(--shadow-dark),
                -6px -6px 12px var(--shadow-light);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn-reset:hover {
            box-shadow:
                4px 4px 8px var(--shadow-dark),
                -4px -4px 8px var(--shadow-light);
            transform: translateY(-2px);
        }

        .btn-reset:active {
            box-shadow:
                inset 3px 3px 6px rgba(0, 0, 0, 0.2),
                inset -3px -3px 6px rgba(255, 255, 255, 0.1);
            transform: translateY(0);
        }

        .btn-reset:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .back-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-light);
        }

        .back-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
        }

        .back-link a:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-header">
            <div class="reset-icon">
                <i class="fas fa-key"></i>
            </div>
            <h1>重置密码</h1>
            <p>请输入您的新密码</p>
        </div>

        <form id="reset-form">
            <div class="form-group">
                <label for="password">新密码</label>
                <input
                    type="password"
                    id="password"
                    class="form-input"
                    placeholder="至少6位字符"
                    minlength="6"
                    required
                >
                <div class="password-strength" id="password-strength"></div>
            </div>

            <div class="form-group">
                <label for="confirm-password">确认新密码</label>
                <input
                    type="password"
                    id="confirm-password"
                    class="form-input"
                    placeholder="再次输入新密码"
                    minlength="6"
                    required
                >
            </div>

            <button type="submit" class="btn-reset" id="reset-btn">
                重置密码
            </button>
        </form>

        <p class="back-link">
            记起密码了？<a href="#" onclick="backToLogin(event)">返回登录</a>
        </p>
    </div>

    <script>
        // 内联Supabase配置
        window.supabaseConfig = {
            "url": "https://aidajdmocdgecwwmzphm.supabase.co",
            "key": "sb_publishable_BYAXSI16XDU__PZiGnmsIw_dV6ycGp2"
        };
    </script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
    <script>
        let authInitialized = false;

        // 初始化认证
        initAuth().then(result => {
            if (result.error) {
                showError('认证服务初始化失败');
            } else {
                authInitialized = true;
            }
        });

        // 密码强度检测
        document.getElementById('password').addEventListener('input', function() {
            const password = this.value;
            const strengthEl = document.getElementById('password-strength');
            
            if (password.length === 0) {
                strengthEl.textContent = '';
                strengthEl.className = 'password-strength';
                return;
            }

            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;

            if (strength <= 2) {
                strengthEl.textContent = '密码强度：弱';
                strengthEl.className = 'password-strength weak';
            } else if (strength <= 3) {
                strengthEl.textContent = '密码强度：中';
                strengthEl.className = 'password-strength medium';
            } else {
                strengthEl.textContent = '密码强度：强';
                strengthEl.className = 'password-strength strong';
            }
        });

        // 重置密码表单提交
        document.getElementById('reset-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            if (!authInitialized) {
                showError('认证服务未初始化');
                return;
            }

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            // 验证密码
            if (password !== confirmPassword) {
                showError('两次输入的密码不一致');
                return;
            }

            if (password.length < 6) {
                showError('密码至少需要6位字符');
                return;
            }

            // 显示加载状态
            const btn = document.getElementById('reset-btn');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 重置中...';

            try {
                // 更新密码
                const result = await window.auth.updatePassword(password);

                if (result.error) {
                    showError('重置失败：' + result.error.message);
                } else {
                    showSuccess('密码重置成功！正在跳转到登录页面...');
                    // 先登出用户，清除临时session
                    await window.auth.logout();
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                }
            } catch (error) {
                showError('重置失败：' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        });

        function showError(message) {
            const existingError = document.querySelector('.error-message');
            if (existingError) {
                existingError.remove();
            }

            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = message;
            errorDiv.style.cssText = 'background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #dc2626; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 14px;';

            const form = document.getElementById('reset-form');
            form.parentNode.insertBefore(errorDiv, form);

            setTimeout(() => {
                errorDiv.remove();
            }, 5000);
        }

        function showSuccess(message) {
            const existingSuccess = document.querySelector('.success-message');
            if (existingSuccess) {
                existingSuccess.remove();
            }

            const successDiv = document.createElement('div');
            successDiv.className = 'success-message';
            successDiv.textContent = message;
            successDiv.style.cssText = 'background: rgba(72, 187, 120, 0.1); border: 1px solid rgba(72, 187, 120, 0.3); color: #059669; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 14px;';

            const form = document.getElementById('reset-form');
            form.parentNode.insertBefore(successDiv, form);

            setTimeout(() => {
                successDiv.remove();
            }, 3000);
        }

        // 返回登录（先登出临时session）
        async function backToLogin(e) {
            e.preventDefault();
            await window.auth.logout();
            window.location.href = 'login.html';
        }

        // 检查URL中的access_token（从邮件链接跳转过来）
        window.addEventListener('load', async function() {
            await initAuth();
            
            // Supabase会自动处理URL中的access_token
            // 我们只需要等待一下确保session已经建立
            setTimeout(async () => {
                const { data: { session } } = await window.auth.supabase.auth.getSession();
                if (!session) {
                    showError('链接已失效或过期，请重新申请密码重置');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                }
            }, 500);
        });
    </script>
</body>
</html>
