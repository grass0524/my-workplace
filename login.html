<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - My Workplace</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-color);
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 48px;
            background: var(--card-bg);
            border-radius: 24px;
            /* 新拟物外阴影 - 凸起效果 */
            box-shadow:
                8px 8px 16px var(--shadow-dark),
                -8px -8px 16px var(--shadow-light);
            margin: 20px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .app-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: var(--primary-color);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Logo 凸起效果 */
            box-shadow:
                4px 4px 8px var(--shadow-dark),
                -4px -4px 8px var(--shadow-light);
            color: white;
            font-size: 36px;
        }

        .login-header h1 {
            font-size: 28px;
            color: var(--primary-color);
            margin-bottom: 8px;
        }

        .login-header p {
            font-size: 16px;
            color: var(--text-light);
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            height: 56px;
            padding: 0 20px;
            border: none;
            border-radius: 12px;
            background: var(--card-bg);
            /* 新拟物内阴影 - 凹陷效果 */
            box-shadow:
                inset 5px 5px 10px var(--shadow-dark),
                inset -5px -5px 10px var(--shadow-light);
            font-size: 15px;
            color: var(--text-color);
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            /* 聚焦时加深凹陷效果 */
            box-shadow:
                inset 6px 6px 12px var(--shadow-dark),
                inset -6px -6px 12px var(--shadow-light);
        }

        .form-input::placeholder {
            color: var(--text-light);
        }

        .form-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 20px;
            height: 20px;
            border: none;
            border-radius: 6px;
            background: var(--card-bg);
            /* 复选框凹陷效果 */
            box-shadow:
                inset 3px 3px 6px var(--shadow-dark),
                inset -3px -3px 6px var(--shadow-light);
            cursor: pointer;
            appearance: none;
            position: relative;
        }

        .remember-me input[type="checkbox"]:checked {
            background: var(--primary-color);
        }

        .remember-me input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 14px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .remember-me label {
            font-size: 14px;
            color: var(--text-light);
            cursor: pointer;
            margin: 0;
        }

        .forgot-password {
            font-size: 14px;
            color: var(--primary-color);
            text-decoration: none;
            transition: opacity 0.3s ease;
        }

        .forgot-password:hover {
            opacity: 0.8;
        }

        .btn-login {
            width: 100%;
            height: 56px;
            border: none;
            border-radius: 12px;
            background: var(--primary-color);
            /* 按钮凸起效果 */
            box-shadow:
                6px 6px 12px var(--shadow-dark),
                -6px -6px 12px var(--shadow-light);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            /* 悬停时减弱阴影，营造浮起感 */
            box-shadow:
                4px 4px 8px var(--shadow-dark),
                -4px -4px 8px var(--shadow-light);
            transform: translateY(-2px);
        }

        .btn-login:active {
            /* 点击时变成凹陷效果 */
            box-shadow:
                inset 3px 3px 6px rgba(0, 0, 0, 0.2),
                inset -3px -3px 6px rgba(255, 255, 255, 0.1);
            transform: translateY(0);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 32px 0;
            gap: 16px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .divider span {
            color: var(--text-light);
            font-size: 14px;
        }

        .register-link {
            text-align: center;
            font-size: 14px;
            color: var(--text-light);
        }

        .register-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
            margin-left: 4px;
        }

        .register-link a:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="app-logo">
                <i class="fas fa-briefcase"></i>
            </div>
            <h1>Welcome Back</h1>
            <p>登录到 My Workplace</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="email">邮箱地址</label>
                <input
                    type="email"
                    id="email"
                    class="form-input"
                    placeholder="your@email.com"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input
                    type="password"
                    id="password"
                    class="form-input"
                    placeholder="••••••••"
                    required
                >
            </div>

            <div class="form-actions">
                <label class="remember-me">
                    <input type="checkbox" id="remember">
                    <label for="remember">记住我</label>
                </label>
                <a href="#" class="forgot-password">忘记密码？</a>
            </div>

            <button type="submit" class="btn-login">登录</button>
        </form>

        <div class="divider">
            <span>或</span>
        </div>

        <p class="register-link">
            还没有账号？<a href="#">立即注册</a>
        </p>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;

            // TODO: 实现登录逻辑
            console.log('登录信息:', { email, password, remember });

            // 登录成功后跳转到主页
            // window.location.href = 'index.html';
        });
    </script>
</body>
</html>
